<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — DIRI Digital Rights</title>
  <meta name="description" content="Log in to your DIRI account to access learning cards, quizzes, and the leaderboard.">

  <!-- Open Graph / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="DIRI — Digital Rights">
  <meta property="og:title" content="Log In — DIRI Digital Rights">
  <meta property="og:description" content="Log in to your DIRI account to access learning cards, quizzes, and the leaderboard.">
  <meta property="og:image" content="assets/og-image.png">
  <meta property="og:image:width" content="1600">
  <meta property="og:image:height" content="900">
  <meta property="og:image:alt" content="DIRI — Log in to continue your learning journey.">
  <meta property="og:locale" content="en_UG">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Log In — DIRI Digital Rights">
  <meta name="twitter:description" content="Log in to your DIRI account to access learning cards, quizzes, and the leaderboard.">
  <meta name="twitter:image" content="assets/og-image.png">
  <meta name="twitter:image:alt" content="DIRI — Log in to continue your learning journey.">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- SIMPLIFIED HEADER (no nav, just logo) -->
  <header class="header" role="banner" style="border-bottom: none;">
    <div class="header-inner" style="justify-content: center;">
      <a href="index.html" class="header-logo">
        <img src="assets/logo.png" alt="DIRI Logo">
        <span>DIRI</span>
      </a>
    </div>
  </header>

  <!-- AUTH PAGE -->
  <div class="auth-page">
    <div class="auth-card animate-in">
      <div class="auth-logo">
        <img src="assets/logo.png" alt="DIRI Logo">
      </div>
      <h1 class="heading-sm">Welcome back</h1>
      <p class="auth-subtitle">Log in to continue your learning journey</p>

      <form class="auth-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
          <div class="form-error"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div style="position: relative;">
            <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
          </div>
          <div class="form-error"></div>
          <a href="#" class="forgot-link" data-forgot-password>Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">Log In</button>
      </form>

      <div class="form-divider">or continue with</div>

      <button type="button" class="google-auth" data-provider="google">
        <img class="google-mark" src="assets/google-g.svg" alt="" aria-hidden="true">
        <span>Continue with Google</span>
      </button>

      <p class="auth-footer-text">
        Don't have an account? <a href="register.html">Create one</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
